<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Login SPID - Demo</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 500px;
      margin: 80px auto;
      padding: 0 20px;
    }

    h1 {
      color: #333;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #666;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 15px;
      box-sizing: border-box;
    }

    .btn {
      background: #06c;
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
    }

    .btn:hover {
      background: #005bb5;
    }

    .nota {
      color: #999;
      font-size: 13px;
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <h1>Accedi con SPID</h1>
  <p>Identity Provider: <strong>SPID Demo</strong></p>

  <form action="/mock/auth" method="post">
    <div class="form-group">
      <label>Nome</label>
      <input type="text" name="name" value="Mario" required />
    </div>
    <div class="form-group">
      <label>Cognome</label>
      <input type="text" name="surname" value="Rossi" required />
    </div>
    <div class="form-group">
      <label>Codice Fiscale</label>
      <input type="text" name="taxId" value="RSSMRA80A01H501U" required />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" value="mario.rossi@esempio.it" required />
    </div>
    <button type="submit" class="btn">Entra</button>
  </form>

  <p class="nota">Questa è una simulazione per demo. In produzione l'utente si autentica sul sito del proprio Identity
    Provider.</p>
</body>

</html>
