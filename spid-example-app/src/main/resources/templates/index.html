<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>SPID Java SDK - Demo</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 80px auto;
      padding: 0 20px;
    }

    h1 {
      color: #333;
    }

    .btn-spid {
      background: #06c;
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      margin-top: 20px;
    }

    .btn-spid:hover {
      background: #005bb5;
    }

    .info {
      background: #f5f5f5;
      padding: 16px;
      border-radius: 4px;
      margin-top: 30px;
    }
  </style>
</head>

<body>
  <h1>SPID Java SDK — Demo</h1>
  <p>Esempio di integrazione SPID con Spring Boot.</p>

  <a href="/spid/login-page" class="btn-spid">
    Accedi con SPID
  </a>

  <div class="info">
    <strong>Come funziona:</strong><br>
    1. Clicca il pulsante<br>
    2. Scegli il tuo Identity Provider<br>
    3. Autenticati con SPID<br>
    4. Vieni reindirizzato alla dashboard
  </div>
</body>

</html>
